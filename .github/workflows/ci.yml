name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # matches the Lambda runtime
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
        # The corpus (recipes_tagged.json) isn't committed, so the corpus-backed
        # tests skip in CI; the parser/planner/renderer logic tests still run.
